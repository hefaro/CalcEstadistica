<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Archivos - NCS</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd600; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; margin: 15px 0; border-radius: 8px; border: 2px solid #ddd; padding: 10px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; color: white; transition: 0.3s; }
        .btn-save { background: #2e7d32; }
        .btn-open { background: #0288d1; }
        .btn-back { background: #455a64; text-decoration: none; display: inline-block; font-size: 14px; }
        input[type="file"] { display: none; }
        .info { font-size: 0.9em; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📂 Centro de Datos NCS</h2>
    <p class="info">Carga o guarda tus listas de datos en formato CSV.</p>
    
    <textarea id="txtDatos" placeholder="Pega tus datos aquí o abre un archivo..."></textarea>

    <div class="controls">
        <label for="fileInput" class="btn btn-open">📂 Abrir CSV</label>
<input type="file" id="fileInput" accept=".csv, text/csv, text/plain, .txt" onchange="leerArchivo(event)" style="display: none;">

        <button class="btn btn-save" onclick="guardarCSV()">💾 Guardar CSV</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <a href="index.html" class="btn btn-back">⬅ Volver al Inicio</a>
</div>

<script>
    function guardarCSV() {
        const contenido = document.getElementById('txtDatos').value;
        if (!contenido) return alert("No hay datos para guardar.");

        const blob = new Blob([contenido], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const fecha = new Date().toISOString().slice(0,10);
        
        link.href = URL.createObjectURL(blob);
        link.download = `datos_ncs_${fecha}.csv`;
        link.click();
    }

function leerArchivo(evento) {
    const archivo = evento.target.files[0];
    if (!archivo) return;

    // Forzamos al lector a interpretar el archivo como texto plano
    const lector = new FileReader();
    lector.onload = function(e) {
        const contenido = e.target.result;
        
        // Limpiamos espacios y saltos de línea para que Excel lo entienda después
        const datosLimpios = contenido.trim();
        
        document.getElementById('txtDatos').value = datosLimpios;
        
        // Guardamos en la memoria interna (localStorage) 
        // para que aparezca solo en los laboratorios
        localStorage.setItem('datosNCS_Temp', datosLimpios);
        
        alert("✅ Archivo detectado y cargado con éxito.");
    };
    
    // Usamos readAsText explícitamente para evitar que se vea "borroso" o con símbolos raros
    lector.readAsText(archivo, 'UTF-8');
}
</script>

</body>
</html>
